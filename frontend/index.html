<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision AI | Image Recognition Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    keyframes: {
                        fadeSlideUp: { '0%': { opacity: '0', transform: 'translateY(16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        scalePop: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                        shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
                        pulse2: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.4' } },
                        bounceDot: { '0%, 80%, 100%': { transform: 'scale(0)' }, '40%': { transform: 'scale(1)' } }
                    },
                    animation: {
                        fadeSlideUp: 'fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        fadeIn: 'fadeIn 0.3s ease forwards',
                        scalePop: 'scalePop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        bounceDot: 'bounceDot 1.4s infinite ease-in-out both'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 dark:bg-gray-950 text-gray-800 dark:text-gray-100 font-sans h-screen overflow-hidden transition-colors duration-300">

    <!-- Mobile Sidebar Overlay (backdrop) -->
    <div id="sidebar-overlay"></div>



    <div class="flex h-screen w-full overflow-hidden">

        <!-- ============ SIDEBAR ============ -->
        <aside id="sidebar"
            class="flex flex-col w-72 flex-shrink-0 bg-white dark:bg-gray-900 border-r border-gray-100 dark:border-gray-800">

            <!-- Sidebar Top - Interactive Logo -->
            <div class="flex items-center h-16 px-5 border-b border-gray-100 dark:border-gray-800">
                <div class="logo-wrap flex items-center gap-3 cursor-pointer select-none group">
                    <!-- Animated logo icon -->
                    <div class="logo-icon relative w-9 h-9 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30 transition-all duration-300 group-hover:shadow-indigo-500/60 group-hover:scale-110 group-hover:rotate-12">
                        <!-- Pulsing ring -->
                        <span class="absolute inset-0 rounded-2xl bg-indigo-400 opacity-0 group-hover:opacity-30 group-hover:scale-125 transition-all duration-500"></span>
                        <i class="ph-fill ph-aperture text-white text-lg relative z-10 group-hover:rotate-90 transition-transform duration-500"></i>
                    </div>
                    <!-- Logo text with gradient -->
                    <div class="flex flex-col leading-none">
                        <span class="text-[17px] font-extrabold tracking-tight bg-gradient-to-r from-indigo-600 to-purple-500 bg-clip-text text-transparent">Vision AI</span>
                        <span class="text-[10px] font-medium text-gray-400 dark:text-gray-500 tracking-widest uppercase">Image Recognition</span>
                    </div>
                </div>
            </div>

            <!-- New Chat -->
            <div class="px-4 pt-4">
                <button class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold py-2.5 px-4 rounded-xl transition-all duration-150 shadow-md shadow-indigo-600/25">
                    <i class="ph ph-plus-circle text-lg"></i> New Conversation
                </button>
            </div>

            <!-- Chat History -->
            <div class="flex-1 overflow-y-auto px-3 pt-5 pb-2 custom-scrollbar">
                <div class="text-[10px] font-bold text-gray-400 dark:text-gray-600 uppercase tracking-widest mb-3 px-2">Today</div>
                <div class="space-y-1">
                    <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-left rounded-xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-300 font-semibold border border-indigo-100 dark:border-indigo-500/20 group transition-all">
                        <i class="ph ph-image-square text-base flex-shrink-0"></i>
                        <span class="truncate">Receipt OCR Parsing</span>
                        <i class="ph ph-dots-three ml-auto opacity-0 group-hover:opacity-100 text-indigo-400 transition-opacity"></i>
                    </button>
                    <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-left rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100 group transition-all">
                        <i class="ph ph-eye text-base flex-shrink-0"></i>
                        <span class="truncate">Object Detection Run</span>
                        <i class="ph ph-dots-three ml-auto opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </button>
                    <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-left rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100 group transition-all">
                        <i class="ph ph-camera text-base flex-shrink-0"></i>
                        <span class="truncate">License Plate Reader</span>
                        <i class="ph ph-dots-three ml-auto opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </button>
                </div>

                <div class="text-[10px] font-bold text-gray-400 dark:text-gray-600 uppercase tracking-widest mb-3 mt-5 px-2">Yesterday</div>
                <div class="space-y-1">
                    <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-left rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100 group transition-all">
                        <i class="ph ph-text-aa text-base flex-shrink-0"></i>
                        <span class="truncate">Handwriting Extraction</span>
                        <i class="ph ph-dots-three ml-auto opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </button>
                    <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-left rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100 group transition-all">
                        <i class="ph ph-chart-bar text-base flex-shrink-0"></i>
                        <span class="truncate">Chart Analysis</span>
                        <i class="ph ph-dots-three ml-auto opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </button>
                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="border-t border-gray-100 dark:border-gray-800 p-3 space-y-1">
                <button class="w-full flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100 transition-all">
                    <i class="ph ph-user-circle text-lg"></i> <span class="font-medium">My Account</span>
                </button>
                <button class="w-full flex items-center gap-3 px-3 py-2 text-sm rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100 transition-all">
                    <i class="ph ph-gear text-lg"></i> <span class="font-medium">Settings</span>
                </button>
            </div>
        </aside>

        <!-- ============ MAIN CONTENT ============ -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-50 dark:bg-gray-950 transition-colors duration-300 overflow-hidden relative">

            <!-- Animated Gradient Background Blobs -->
            <div class="pointer-events-none absolute inset-0 overflow-hidden z-0" aria-hidden="true">
                <div class="blob blob-1 absolute w-[500px] h-[500px] rounded-full bg-indigo-400/20 dark:bg-indigo-600/10 blur-3xl"></div>
                <div class="blob blob-2 absolute w-[400px] h-[400px] rounded-full bg-purple-400/15 dark:bg-purple-600/10 blur-3xl"></div>
                <div class="blob blob-3 absolute w-[350px] h-[350px] rounded-full bg-pink-400/10 dark:bg-pink-600/8 blur-3xl"></div>
            </div>

            <!-- Top Header -->
            <header class="h-16 flex items-center justify-between px-4 md:px-6 border-b border-gray-100 dark:border-gray-800 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl sticky top-0 z-10 transition-colors duration-300">
                <div class="flex items-center gap-3">

                    <!-- Hamburger Button (mobile only, hidden on desktop via CSS) -->
                    <button id="hamburger-btn"
                        class="w-9 h-9 items-center justify-center rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-all"
                        title="Open menu" style="display:none">
                        <i class="ph ph-list text-xl"></i>
                    </button>

                    <!-- Breadcrumb / Title -->
                    <div class="flex items-center gap-2">
                        <span class="hidden sm:block text-sm font-medium text-gray-500 dark:text-gray-400">Vision AI</span>
                        <span class="breadcrumb-slash hidden sm:block text-gray-300 dark:text-gray-700">/</span>
                        <span class="text-sm font-semibold text-gray-900 dark:text-white">Image Recognition Chat</span>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <!-- Model Badge -->
                    <div class="hidden sm:flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-full bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 border border-indigo-100 dark:border-indigo-500/20">
                        <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></span> Vision-Py v2
                    </div>
                    <!-- Theme Toggle -->
                    <button id="theme-toggle"
                        class="w-9 h-9 flex items-center justify-center rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-all"
                        title="Toggle dark/light mode">
                        <i id="theme-icon" class="ph ph-moon text-xl"></i>
                    </button>
                    <!-- Clear Chat -->
                    <button id="clear-chat-btn"
                        class="w-9 h-9 flex items-center justify-center rounded-lg text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 transition-all"
                        title="Clear Chat">
                        <i class="ph ph-trash text-xl"></i>
                    </button>
                </div>
            </header>

            <!-- Chat Area -->
            <div id="chat-window"
                class="flex-1 overflow-y-auto custom-scrollbar w-full flex justify-center py-6">
                <div class="w-full max-w-2xl px-4 flex flex-col gap-5" id="chat-messages-container">

                    <!-- Welcome Screen -->
                    <div id="welcome-screen" class="flex flex-col items-center justify-center text-center py-4 animate-fadeSlideUp">

                        <!-- Animated Icon -->
                        <div class="relative mb-4">
                            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-xl shadow-indigo-500/25">
                                <i class="ph-fill ph-aperture text-white text-3xl"></i>
                            </div>
                            <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-emerald-400 rounded-full border-2 border-white dark:border-gray-950 flex items-center justify-center">
                                <i class="ph-fill ph-sparkle text-white" style="font-size:10px"></i>
                            </div>
                        </div>

                        <h1 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight mb-1">What can I help with?</h1>
                        <p class="text-gray-500 dark:text-gray-400 text-sm max-w-xs leading-relaxed mb-5">
                            Upload an image and ask anything — AI powered by Python will analyze it instantly.
                        </p>

                        <!-- Feature Cards Grid — always 2 cols, compact on mobile -->
                        <div class="feature-grid grid grid-cols-2 gap-2.5 w-full mb-5">

                            <!-- Object Detection -->
                            <button class="feature-card group text-left bg-white dark:bg-gray-800/80 rounded-2xl border border-gray-100 dark:border-gray-700 hover:border-indigo-300 dark:hover:border-indigo-500/50 hover:shadow-lg hover:shadow-indigo-500/10 active:scale-[0.97] transition-all duration-200 overflow-hidden">
                                <div class="card-icon-wrap flex items-center justify-center w-10 h-10 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 group-hover:bg-indigo-100 dark:group-hover:bg-indigo-500/20 transition-colors">
                                    <i class="ph-fill ph-magnifying-glass text-xl text-indigo-600 dark:text-indigo-400"></i>
                                </div>
                                <p class="card-title font-semibold text-gray-900 dark:text-white text-sm">Object Detection</p>
                                <p class="card-desc text-xs text-gray-500 dark:text-gray-400 leading-relaxed">Identify &amp; locate objects.</p>
                            </button>

                            <!-- OCR Text Extraction -->
                            <button class="feature-card group text-left bg-white dark:bg-gray-800/80 rounded-2xl border border-gray-100 dark:border-gray-700 hover:border-purple-300 dark:hover:border-purple-500/50 hover:shadow-lg hover:shadow-purple-500/10 active:scale-[0.97] transition-all duration-200 overflow-hidden">
                                <div class="card-icon-wrap flex items-center justify-center w-10 h-10 rounded-xl bg-purple-50 dark:bg-purple-500/10 group-hover:bg-purple-100 dark:group-hover:bg-purple-500/20 transition-colors">
                                    <i class="ph-fill ph-text-t text-xl text-purple-600 dark:text-purple-400"></i>
                                </div>
                                <p class="card-title font-semibold text-gray-900 dark:text-white text-sm">OCR Extraction</p>
                                <p class="card-desc text-xs text-gray-500 dark:text-gray-400 leading-relaxed">Digitize text from docs.</p>
                            </button>

                            <!-- Face & Expression -->
                            <button class="feature-card group text-left bg-white dark:bg-gray-800/80 rounded-2xl border border-gray-100 dark:border-gray-700 hover:border-rose-300 dark:hover:border-rose-500/50 hover:shadow-lg hover:shadow-rose-500/10 active:scale-[0.97] transition-all duration-200 overflow-hidden">
                                <div class="card-icon-wrap flex items-center justify-center w-10 h-10 rounded-xl bg-rose-50 dark:bg-rose-500/10 group-hover:bg-rose-100 dark:group-hover:bg-rose-500/20 transition-colors">
                                    <i class="ph-fill ph-smiley text-xl text-rose-500 dark:text-rose-400"></i>
                                </div>
                                <p class="card-title font-semibold text-gray-900 dark:text-white text-sm">Face &amp; Expression</p>
                                <p class="card-desc text-xs text-gray-500 dark:text-gray-400 leading-relaxed">Detect faces &amp; emotions.</p>
                            </button>

                            <!-- Image Analysis -->
                            <button class="feature-card group text-left bg-white dark:bg-gray-800/80 rounded-2xl border border-gray-100 dark:border-gray-700 hover:border-amber-300 dark:hover:border-amber-500/50 hover:shadow-lg hover:shadow-amber-500/10 active:scale-[0.97] transition-all duration-200 overflow-hidden">
                                <div class="card-icon-wrap flex items-center justify-center w-10 h-10 rounded-xl bg-amber-50 dark:bg-amber-500/10 group-hover:bg-amber-100 dark:group-hover:bg-amber-500/20 transition-colors">
                                    <i class="ph-fill ph-chart-pie-slice text-xl text-amber-500 dark:text-amber-400"></i>
                                </div>
                                <p class="card-title font-semibold text-gray-900 dark:text-white text-sm">Image Analysis</p>
                                <p class="card-desc text-xs text-gray-500 dark:text-gray-400 leading-relaxed">Scene, color &amp; context.</p>
                            </button>

                        </div>

                        <!-- Suggestion Pills — horizontal scroll on mobile -->
                        <div class="w-full">
                            <p class="text-xs text-gray-400 dark:text-gray-600 font-semibold uppercase tracking-widest mb-2.5">Try asking</p>
                            <div class="pills-scroll flex gap-2 overflow-x-auto pb-1" style="-webkit-overflow-scrolling:touch; scrollbar-width:none;">
                                <button class="suggestion-pill flex-shrink-0 px-3.5 py-2 text-xs rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:border-indigo-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all active:scale-95 whitespace-nowrap">"What objects are in this image?"</button>
                                <button class="suggestion-pill flex-shrink-0 px-3.5 py-2 text-xs rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:border-purple-400 hover:text-purple-600 dark:hover:text-purple-400 transition-all active:scale-95 whitespace-nowrap">"Extract all text from this receipt"</button>
                                <button class="suggestion-pill flex-shrink-0 px-3.5 py-2 text-xs rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:border-rose-400 hover:text-rose-500 dark:hover:text-rose-400 transition-all active:scale-95 whitespace-nowrap">"Describe this scene in detail"</button>
                            </div>
                        </div>

                    </div>
                    <!-- Messages appended here -->
                </div>
            </div>

            <!-- Input Area -->
            <div class="w-full flex justify-center px-4 pb-5 pt-2 bg-gradient-to-t from-slate-50 via-slate-50/95 to-transparent dark:from-gray-950 dark:via-gray-950/95 dark:to-transparent">
                <div class="w-full max-w-2xl">
                    <!-- Input Box -->
                    <div id="input-wrapper"
                        class="bg-white dark:bg-gray-800/90 border-2 border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm focus-within:border-indigo-400 dark:focus-within:border-indigo-500 focus-within:shadow-lg focus-within:shadow-indigo-500/10 transition-all duration-200">

                        <!-- Image Preview Strip -->
                        <div id="image-preview-container" class="hidden px-4 pt-3">
                            <div class="flex items-center gap-2 pb-3 border-b border-gray-100 dark:border-gray-700">
                                <div class="relative group">
                                    <img id="image-preview" src="" class="h-14 w-14 rounded-xl object-cover border border-gray-200 dark:border-gray-600">
                                    <button id="remove-image"
                                        class="absolute -top-2 -right-2 w-5 h-5 bg-gray-800 dark:bg-white text-white dark:text-gray-900 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:scale-110 shadow-md">
                                        <i class="ph ph-x" style="font-size:10px"></i>
                                    </button>
                                </div>
                                <div>
                                    <p class="text-xs font-medium text-gray-700 dark:text-gray-300">Image ready</p>
                                    <p class="text-[11px] text-gray-400 dark:text-gray-500">AI will analyze this image</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-end gap-2 p-2.5">
                            <!-- Upload Button -->
                            <button onclick="document.getElementById('image-upload').click()"
                                class="flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-xl text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 transition-colors"
                                title="Upload image">
                                <i class="ph ph-paperclip text-lg"></i>
                            </button>
                            <input type="file" id="image-upload" accept="image/*" class="hidden">

                            <!-- Textarea -->
                            <textarea id="message-input" rows="1"
                                class="flex-1 bg-transparent border-none focus:ring-0 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 resize-none py-2 max-h-36 custom-scrollbar text-sm outline-none leading-relaxed"
                                placeholder="Message Vision AI..."></textarea>

                            <!-- Send Button -->
                            <button id="send-btn" disabled
                                class="flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-xl bg-indigo-600 text-white shadow-md shadow-indigo-600/25 hover:bg-indigo-700 active:scale-90 transition-all disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none disabled:scale-100">
                                <i class="ph-fill ph-paper-plane-right text-base"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
